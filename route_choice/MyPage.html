{{ block title }}
    🚗 路线选择
{{ endblock }}

{{ block content }}
    <p class="text-sub">🧭 当前为第 {{ player.round_number }} / {{ C.NUM_ROUNDS }} 轮，选择你本轮的出行路线。</p>

    <div class="card-lite">
        <p class="text-main">🎯 你的任务：前往同一目的地，请在两条路线中选择一条。</p>
        <p class="text-sub">🚦 同一路线选择人数越多，拥堵越明显，通行时间会更长。</p>
    </div>

    <div class="hint-lite">
        💡 积分规则：奖励 = 基础分 - 时间成本 - 过路费用。
    </div>

    <p class="text-sub">⏱ 请在 30 秒内完成选择；若超时未操作，系统将随机分配路线（A/B 各 50%）。</p>

    {{ formfields }}

    <button class="otree-btn-next btn btn-primary">确认本轮选择</button>
{{ endblock }}
